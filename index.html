<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Training records</title>
<style>
  :root {
    --bg: #0f1115; --bg-elev: #1a1d24; --bg-elev-2: #232730;
    --border: #3a3f4b; --border-strong: #555b6b;
    --text: #e8eaed; --text-2: #b0b6c0; --text-3: #7a818e;
    --accent: #4f8cff; --accent-hover: #6fa0ff;
    --success-bg:#1e3a2a;--success-fg:#5ee39b;
    --warn-bg:#3a2f1a;--warn-fg:#f2c14a;
    --danger-bg:#3a1e22;--danger-fg:#ff6b7a;
    --walkin-bg:#2a2233;--walkin-fg:#c89cf0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .topbar h1 { font-size: 22px; font-weight: 600; }
  .topbar p { font-size: 13px; color: var(--text-2); margin-top: 2px; }
  .trainer-picker { display: flex; flex-direction: column; gap: 4px; }
  .trainer-picker label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
  .trainer-picker select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elev); color: var(--text); font-size: 14px; min-width: 200px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .toolbar input[type=text] { flex: 1; min-width: 200px; height: 40px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elev); color: var(--text); font-size: 14px; }
  .toolbar input::placeholder { color: var(--text-3); }
  .batch-actions { display: flex; gap: 8px; align-items: center; }
  .batch-actions .count { font-size: 13px; color: var(--text-2); }
  .applicants { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .applicants th, .applicants td { padding: 12px 14px; font-size: 13px; text-align: left; border-bottom: 1px solid var(--border); }
  .applicants th { background: var(--bg-elev-2); color: var(--text-2); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .applicants tr:last-child td { border-bottom: none; }
  .applicants tbody tr { cursor: pointer; }
  .applicants tbody tr:hover { background: var(--bg-elev-2); }
  .applicants td.name { font-weight: 500; color: var(--text); }
  .chip { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg-elev-2); color: var(--text-2); }
  .chip.walkin-pool { background: var(--walkin-bg); color: var(--walkin-fg); }
  .chip.walkin-owned { background: var(--walkin-bg); color: var(--walkin-fg); opacity: 0.75; }
  .progress { font-size: 12px; color: var(--text-2); }
  .row-actions { text-align: right; white-space: nowrap; }
  .row-actions button { padding: 4px 10px; font-size: 12px; background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; }
  .row-actions button:hover { border-color: var(--border-strong); }
  .empty { text-align: center; padding: 3rem 0; color: var(--text-2); font-size: 14px; }
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text); }
  .btn:hover { background: var(--bg-elev-2); border-color: var(--border-strong); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
  .btn-ghost:hover { color: var(--text); background: var(--bg-elev); }
  .worker-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 14px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: #2a3550; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #9dc0ff; flex-shrink: 0; }
  .worker-info { flex: 1; }
  .worker-info h2 { font-size: 16px; font-weight: 600; }
  .worker-info p { font-size: 13px; color: var(--text-2); margin-top: 2px; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg-elev); color: var(--text-2); cursor: pointer; }
  .filter-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .training-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; margin-bottom: 1.5rem; }
  .training-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .training-card-header { padding: 10px 14px; background: var(--bg-elev-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .training-card-header span { font-size: 13px; font-weight: 600; }
  .grade-badge { font-size: 12px; padding: 2px 10px; border-radius: 6px; font-weight: 600; }
  .grade-high { background: var(--success-bg); color: var(--success-fg); }
  .grade-mid  { background: var(--warn-bg);    color: var(--warn-fg); }
  .grade-low  { background: var(--danger-bg);  color: var(--danger-fg); }
  .grade-none { background: var(--bg-elev-2);  color: var(--text-3); }
  .training-card-body { padding: 12px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field textarea, .field select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; }
  .field input::placeholder, .field textarea::placeholder { color: var(--text-3); }
  .field textarea { resize: vertical; min-height: 60px; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,140,255,0.2); }
  .field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 0.5rem; flex-wrap: wrap; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--bg-elev-2); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 10px 18px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 500; }
  .modal { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; max-width: 460px; width: 90%; }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
  .modal p { font-size: 14px; color: var(--text-2); margin-bottom: 1rem; }
  .modal .actions { justify-content: flex-end; }
  .hidden { display: none !important; }
  .batch-queue { font-size: 12px; color: var(--text-2); margin-bottom: 0.5rem; }
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <div>
      <h1>Training records</h1>
      <p>Select trainer profile to manage applicant training.</p>
    </div>
    <div class="trainer-picker">
      <label>Trainer</label>
      <select id="trainerSelect" onchange="onTrainerChange()">
        <option value="">Loading...</option>
      </select>
    </div>
  </div>

  <section id="applicantsView">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search applicants by name..." oninput="renderApplicants()" />
      <div class="batch-actions hidden" id="batchActions">
        <span class="count" id="selectedCount">0 selected</span>
        <button class="btn btn-primary" onclick="openBatchEdit()">Batch edit</button>
        <button class="btn btn-ghost" onclick="clearSelection()">Clear</button>
      </div>
    </div>
    <div id="applicantsContainer"></div>
  </section>

  <section id="trainingView" class="hidden">
    <button class="btn btn-ghost" onclick="backToList()" style="margin-bottom: 1rem;">&larr; Back to list</button>
    <div class="batch-queue hidden" id="batchQueue"></div>
    <div class="worker-card" id="workerCard"></div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('trained', this)">Trained</button>
      <button class="filter-btn" onclick="setFilter('untrained', this)">Not yet trained</button>
    </div>
    <div class="training-grid" id="trainingGrid"></div>
    <div class="actions">
      <button class="btn" onclick="backToList()">Cancel</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitAll()">Submit</button>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<div id="claimModal" class="modal-overlay hidden">
  <div class="modal">
    <h3>Claim walk-in?</h3>
    <p id="claimText"></p>
    <div class="actions">
      <button class="btn" onclick="closeClaim()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmClaim()">Claim</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby-aU5thXJkmqoL6OpwVWGBI_4GHwXQR9tbzSD96Z_XwYe8LmaIcI2CUji7TM7OB5qu/exec';

const CATEGORIES = [
  "Bedroom","Living Room","Toilet and Bathroom","Laundry","Ironing",
  "Cooking","Kitchen","Kitchen Appliances","Table Setting","Wiping",
  "Childcare","Elderly","Office Cleaning","Common Toilet and Bathroom",
  "Warehouse/Stockroom","Hospital Setup"
];

let trainers = [];
let branches = {};
let applicants = [];
let records = {};

let currentTrainer = null;
let currentApplicant = null;
let formData = {};
let activeFilter = 'all';

let selected = new Set();
let batchQueue = [];
let batchDefaults = null;
let pendingClaimId = null;

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    trainers = data.trainers || [];
    branches = data.branches || {};
    applicants = data.applicants || [];
    records = data.records || {};
    fillTrainerSelect();
    restoreTrainer();
  } catch (err) {
    showToast('Load failed: ' + err.message);
  }
}

function fillTrainerSelect() {
  const sel = document.getElementById('trainerSelect');
  sel.innerHTML = '';
  const opt0 = document.createElement('option');
  opt0.value = ''; opt0.textContent = '-- Select trainer --';
  sel.appendChild(opt0);
  trainers.forEach(t => {
    const o = document.createElement('option');
    o.value = t.id; o.textContent = t.name;
    sel.appendChild(o);
  });
}

function restoreTrainer() {
  const saved = localStorage.getItem('trainerId');
  if (saved && trainers.find(t => t.id === saved)) {
    document.getElementById('trainerSelect').value = saved;
    onTrainerChange();
  }
}

function onTrainerChange() {
  const id = document.getElementById('trainerSelect').value;
  currentTrainer = trainers.find(t => t.id === id) || null;
  if (currentTrainer) localStorage.setItem('trainerId', currentTrainer.id);
  clearSelection();
  renderApplicants();
}

function trainerBranches(trainerId) {
  return Object.keys(branches).filter(b => branches[b] === trainerId);
}

function applicantVisible(a) {
  if (!currentTrainer) return false;
  const myBranches = trainerBranches(currentTrainer.id);
  return a.Branch === 'walk-in' || myBranches.includes(a.Branch);
}

function applicantCategoriesTrained(id) {
  const r = records[id] || {};
  return CATEGORIES.filter(c => r[c] && r[c].grade !== '' && r[c].grade !== null && r[c].grade !== undefined).length;
}

function renderApplicants() {
  const c = document.getElementById('applicantsContainer');
  if (!currentTrainer) {
    c.textContent = '';
    const d = document.createElement('div');
    d.className = 'empty'; d.textContent = 'Select a trainer to begin.';
    c.appendChild(d);
    return;
  }
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const visible = applicants
    .filter(applicantVisible)
    .filter(a => !q || (a['Full name'] || '').toLowerCase().includes(q));

  if (!visible.length) {
    c.textContent = '';
    const d = document.createElement('div');
    d.className = 'empty'; d.textContent = 'No applicants found for this trainer.';
    c.appendChild(d);
    updateBatchBar();
    return;
  }

  const ownedLabel = currentTrainer.name.replace(/^Mam\s+/i,'').trim() + '_walk-in';
  const rowsHtml = visible.map(a => {
    const id = a.applicant_id;
    const isPool = a.Branch === 'walk-in';
    const isOwned = a.Branch === ownedLabel;
    const chipClass = isPool ? 'chip walkin-pool' : (isOwned ? 'chip walkin-owned' : 'chip');
    const trained = applicantCategoriesTrained(id);
    const claimBtn = isPool ? '<button onclick="event.stopPropagation(); askClaim(\'' + escapeAttr(id) + '\')">Claim</button>' : '';
    const checked = selected.has(id) ? 'checked' : '';
    return (
      '<tr onclick="openApplicant(\'' + escapeAttr(id) + '\')">' +
        '<td onclick="event.stopPropagation()"><input type="checkbox" ' + checked + ' onchange="toggleSelect(\'' + escapeAttr(id) + '\', this.checked)" /></td>' +
        '<td class="name">' + escapeHtml(a['Full name'] || '(no name)') + '</td>' +
        '<td><span class="' + chipClass + '">' + escapeHtml(a.Branch || '-') + '</span></td>' +
        '<td class="progress">' + trained + '/' + CATEGORIES.length + '</td>' +
        '<td class="row-actions">' + claimBtn + '</td>' +
      '</tr>'
    );
  }).join('');

  c.innerHTML =
    '<table class="applicants">' +
      '<thead><tr>' +
        '<th style="width:32px"></th>' +
        '<th>Name</th><th>Branch</th><th>Trained</th><th></th>' +
      '</tr></thead>' +
      '<tbody>' + rowsHtml + '</tbody>' +
    '</table>';
  updateBatchBar();
}

function toggleSelect(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  updateBatchBar();
}

function clearSelection() {
  selected.clear();
  batchQueue = [];
  batchDefaults = null;
  const q = document.getElementById('batchQueue');
  if (q) q.classList.add('hidden');
  updateBatchBar();
  renderApplicants();
}

function updateBatchBar() {
  const bar = document.getElementById('batchActions');
  const count = document.getElementById('selectedCount');
  if (selected.size > 0) {
    bar.classList.remove('hidden');
    count.textContent = selected.size + ' selected';
  } else {
    bar.classList.add('hidden');
  }
}

function openApplicant(id) {
  currentApplicant = applicants.find(a => a.applicant_id === id);
  if (!currentApplicant) return;
  const existing = records[id] || {};
  formData = {};
  CATEGORIES.forEach(cat => {
    formData[cat] = existing[cat] ? { ...existing[cat] } : { date: '', grade: '', note: '', trainer: '' };
    if (batchDefaults) {
      if (!formData[cat].date)    formData[cat].date    = batchDefaults.date || '';
      if (!formData[cat].trainer) formData[cat].trainer = batchDefaults.trainer || '';
    }
  });
  document.getElementById('applicantsView').classList.add('hidden');
  document.getElementById('trainingView').classList.remove('hidden');
  renderBatchQueue();
  renderWorkerCard();
  renderGrid();
  window.scrollTo(0, 0);
}

function renderBatchQueue() {
  const q = document.getElementById('batchQueue');
  if (batchQueue.length === 0) { q.classList.add('hidden'); return; }
  const idx = batchQueue.indexOf(currentApplicant.applicant_id);
  q.classList.remove('hidden');
  q.textContent = 'Batch mode · Applicant ' + (idx + 1) + ' of ' + batchQueue.length;
  document.getElementById('submitBtn').textContent = (idx < batchQueue.length - 1) ? 'Submit & Next' : 'Submit & Finish';
}

function backToList() {
  document.getElementById('applicantsView').classList.remove('hidden');
  document.getElementById('trainingView').classList.add('hidden');
  document.getElementById('submitBtn').textContent = 'Submit';
  currentApplicant = null;
  renderApplicants();
}

function renderWorkerCard() {
  const a = currentApplicant;
  const name = a['Full name'] || '(no name)';
  const initials = name.split(' ').map(n => n[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
  const trained = applicantCategoriesTrained(a.applicant_id);
  document.getElementById('workerCard').innerHTML =
    '<div class="avatar">' + escapeHtml(initials) + '</div>' +
    '<div class="worker-info">' +
      '<h2>' + escapeHtml(name) + '</h2>' +
      '<p>' + escapeHtml(a.Branch || '-') + ' · ID: ' + escapeHtml(a.applicant_id) +
      (a['Contact number'] ? ' · ' + escapeHtml(a['Contact number']) : '') + '</p>' +
    '</div>' +
    '<div style="text-align:right">' +
      '<div style="font-size:24px; font-weight:600;">' + trained +
        '<span style="font-size:13px; color:var(--text-3)">/' + CATEGORIES.length + '</span></div>' +
      '<div style="font-size:11px; color:var(--text-3)">categories trained</div>' +
    '</div>';
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function gradeClass(grade) {
  if (grade === '' || grade === null || grade === undefined) return 'grade-none';
  const n = Number(grade);
  if (isNaN(n)) return 'grade-none';
  if (n >= 80) return 'grade-high';
  if (n >= 60) return 'grade-mid';
  return 'grade-low';
}

function renderGrid() {
  const grid = document.getElementById('trainingGrid');
  let cats = CATEGORIES;
  if (activeFilter === 'trained')   cats = CATEGORIES.filter(c => formData[c].grade !== '' && formData[c].grade !== null);
  if (activeFilter === 'untrained') cats = CATEGORIES.filter(c => formData[c].grade === '' || formData[c].grade === null);
  if (!cats.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">No categories in this filter.</div>';
    return;
  }
  grid.innerHTML = cats.map(cat => {
    const r = formData[cat];
    const gc = gradeClass(r.grade);
    const gradeLabel = (r.grade === '' || r.grade === null) ? '–' : r.grade;
    const cardId = 'card-' + cat.replace(/[^a-z0-9]/gi,'_');
    return (
      '<div class="training-card" id="' + cardId + '">' +
        '<div class="training-card-header">' +
          '<span>' + escapeHtml(cat) + '</span>' +
          '<span class="grade-badge ' + gc + '">' + escapeHtml(String(gradeLabel)) + '</span>' +
        '</div>' +
        '<div class="training-card-body">' +
          '<div class="field full">' +
            '<label>Grade (1–100)</label>' +
            '<input type="number" min="1" max="100" step="1" value="' + escapeAttr(r.grade) + '" placeholder="—" oninput="updateField(\'' + escapeAttr(cat) + '\',\'grade\',this.value)" />' +
          '</div>' +
          '<div class="field full">' +
            '<label>Note</label>' +
            '<textarea placeholder="Optional notes..." onchange="updateField(\'' + escapeAttr(cat) + '\',\'note\',this.value)">' + escapeHtml(r.note || '') + '</textarea>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

function updateField(cat, field, val) {
  formData[cat][field] = val;
  const cardId = 'card-' + cat.replace(/[^a-z0-9]/gi,'_');
  const card = document.getElementById(cardId);
  if (card) {
    const badge = card.querySelector('.grade-badge');
    const grade = formData[cat].grade;
    badge.className = 'grade-badge ' + gradeClass(grade);
    badge.textContent = (grade === '' || grade === null) ? '–' : grade;
  }
}

async function submitAll() {
  const today = new Date().toISOString().substring(0, 10);
  CATEGORIES.forEach(c => {
    if (formData[c].grade !== '' && formData[c].grade !== null && !formData[c].date) {
      formData[c].date = today;
    }
  });
  try {
    showToast('Submitting...');
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'submit',
        applicantId: currentApplicant.applicant_id,
        trainerName: currentTrainer.name,
        records: formData
      })
    });
    records[currentApplicant.applicant_id] = JSON.parse(JSON.stringify(formData));
    showToast('Submitted.');
    if (batchQueue.length > 0) {
      const idx = batchQueue.indexOf(currentApplicant.applicant_id);
      if (idx < batchQueue.length - 1) {
        openApplicant(batchQueue[idx + 1]);
      } else {
        batchQueue = [];
        batchDefaults = null;
        selected.clear();
        backToList();
      }
    }
  } catch (err) {
    showToast('Submit failed: ' + err.message);
  }
}

function openBatchEdit() {
  if (selected.size === 0) return;
  batchDefaults = null;
  batchQueue = Array.from(selected);
  openApplicant(batchQueue[0]);
}

function askClaim(id) {
  pendingClaimId = id;
  const a = applicants.find(x => x.applicant_id === id);
  const label = currentTrainer.name.replace(/^Mam\s+/i,'').trim() + '_walk-in';
  document.getElementById('claimText').textContent =
    'Claim "' + (a['Full name'] || '') + '" as your walk-in? Branch becomes "' + label + '".';
  document.getElementById('claimModal').classList.remove('hidden');
}

function closeClaim() {
  pendingClaimId = null;
  document.getElementById('claimModal').classList.add('hidden');
}

async function confirmClaim() {
  const id = pendingClaimId;
  closeClaim();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'claim', applicantId: id, trainerName: currentTrainer.name })
    });
    const data = await res.json();
    if (data.ok) {
      const a = applicants.find(x => x.applicant_id === id);
      if (a) a.Branch = data.branch;
      showToast('Claimed.');
      renderApplicants();
    } else {
      showToast('Claim failed: ' + (data.error || 'unknown'));
    }
  } catch (err) {
    showToast('Claim failed: ' + err.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 2500);
}

loadData();
</script>
</body>
</html>
